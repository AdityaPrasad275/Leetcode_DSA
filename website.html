<!-- website.html in the root -->
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Leetcode Problem</title>

    <!-- zero-md-->
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
  </head>

  <body>
    <div class="content"></div>

    <!-- Content and other body elements -->
    <zero-md id="markdown-container"></zero-md>
    
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const url = new URLSearchParams(window.location.search).get('url');
        const markdownContainer = document.getElementById('markdown-container');

        if (url) {
          markdownContainer.setAttribute('src', `./${url}`);
        } else {
          console.error('No "url" parameter found in the query string.');
        }
      });
    </script>
  </body>

</html>
