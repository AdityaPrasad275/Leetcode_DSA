<!-- website.html in the root -->
<!DOCTYPE html>
<html lang="en">

  <head>
    <meta charset="UTF-8">
    <title>Solution</title>
    <link rel="stylesheet" href="/website/css/md_render_styles.css">


    <script src="/website/js/zero_md_config.js"></script>
    <!-- Load MathJax library -->
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <!-- zero-md-->
    <script type="module" src="https://cdn.jsdelivr.net/gh/zerodevx/zero-md@2/dist/zero-md.min.js"></script>
    <script src="/website/js/invariants.js" defer></script>
    <link rel="stylesheet" href="/website/css/invariants.css">
    
  </head>

  <body>
    <!-- Zero md -->
    <zero-md id="markdown-container" no-shadow>
      <template data-merge="append">
        <link rel="stylesheet" href="/website/css/prism-material-light.css">
        <link rel="stylesheet" href="/website/css/md_render_styles.css">
      </template>
    </zero-md>

    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const url = new URLSearchParams(window.location.search).get('url');
        const markdownContainer = document.getElementById('markdown-container');

        if (url) {
          markdownContainer.setAttribute('src', `../../${url}`);
        } else {
          console.error('No "url" parameter found in the query string.');
        }
      });
    </script>

    <!-- Footer section -->
    <div id="footer"></div>
  </body>
  <script src="/website/js/theme_script.js"></script>
</html>
